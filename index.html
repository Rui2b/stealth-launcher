<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent-color: #007aff;
            --toggle-bg: rgba(0, 0, 0, 0.3);
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --font-footer: 'Poppins', var(--font-main);
        }

        body {
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1c1c2e 0%, #0a0a12 100%);
            color: var(--text-main);
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .lang-toggle-container {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 32px;
            background: var(--toggle-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 2px;
            cursor: pointer;
            user-select: none;
            border: 1px solid var(--glass-border);
            z-index: 1000;
            box-sizing: border-box;
        }

        .lang-option {
            flex: 1;
            z-index: 2;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            transition: color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .lang-option.active { color: #fff; }

        .slider {
            position: absolute;
            width: 48px;
            height: 28px;
            background: var(--accent-color);
            border-radius: 14px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.4);
            left: 2px;
        }

        .slider.zh { transform: translateX(48px); }
        .slider.en { transform: translateX(0px); }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 35px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="url"]:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
        }

        button {
            background: var(--accent-color);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        button:hover {
            background: #0a84ff;
            transform: scale(1.02);
        }

        .checkbox-group {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-dim);
            position: relative;
            padding-left: 32px;
        }

        .checkbox-group input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0; width: 0;
        }

        .custom-checkmark {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 20px;
            width: 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .checkbox-group input:checked ~ .custom-checkmark {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .custom-checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-group input:checked ~ .custom-checkmark:after { display: block; }

        footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-family: var(--font-footer);
        }

        .gemini-link {
            font-weight: 800;
            text-decoration: none;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #f4af42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="lang-toggle-container" onclick="toggleLang()">
        <div class="slider" id="langSlider"></div>
        <div class="lang-option" id="opt-en">EN</div>
        <div class="lang-option" id="opt-zh">ZH</div>
    </div>

    <div class="container">
        <h1 id="title">Stealth Launcher</h1>
        <p id="desc">Enter a URL to load it in a full-screen <code>about:blank</code> window, hiding the history.</p>
        
        <input type="url" id="targetUrl" placeholder="">
        <button onclick="launchApp()" id="launchBtn">Launch</button>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="selfDestruct">
                <span class="custom-checkmark"></span>
                <span id="labelDestruct">Close this page after launch</span>
            </label>
        </div>
    </div>

    <footer>
        MADE BY <a href="https://example.com" target="_blank" class="gemini-link">RUI</a>
    </footer>

    <script>
        const i18n = {
            en: {
                title: "Stealth Launcher",
                desc: "Enter a URL to load it in a full-screen <code>about:blank</code> window, hiding the history.",
                launchBtn: "Launch",
                labelDestruct: "Close this page after launch",
                alert: "Please enter a valid URL!"
            },
            zh: {
                title: "隐身启动器",
                desc: "输入网址，我们将通过 <code>about:blank</code> 窗口全屏加载，实现地址栏隐身。",
                launchBtn: "启动",
                labelDestruct: "启动后关闭当前页面",
                alert: "请输入有效的网址！"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        window.onload = () => {
            applyLang();
            document.getElementById('targetUrl').value = localStorage.getItem('savedUrl') || '';
            document.getElementById('selfDestruct').checked = localStorage.getItem('savedDestruct') === 'true';
        };

        function saveState() {
            localStorage.setItem('savedUrl', document.getElementById('targetUrl').value);
            localStorage.setItem('savedDestruct', document.getElementById('selfDestruct').checked);
        }

        document.getElementById('targetUrl').addEventListener('input', saveState);
        document.getElementById('selfDestruct').addEventListener('change', saveState);

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('lang', currentLang);
            applyLang();
        }

        function applyLang() {
            const content = i18n[currentLang];
            document.getElementById('title').innerText = content.title;
            document.getElementById('desc').innerHTML = content.desc;
            document.getElementById('launchBtn').innerText = content.launchBtn;
            document.getElementById('labelDestruct').innerText = content.labelDestruct;
            const slider = document.getElementById('langSlider');
            const optEn = document.getElementById('opt-en');
            const optZh = document.getElementById('opt-zh');
            if (currentLang === 'zh') {
                slider.className = 'slider zh';
                optZh.classList.add('active');
                optEn.classList.remove('active');
            } else {
                slider.className = 'slider en';
                optEn.classList.add('active');
                optZh.classList.remove('active');
            }
        }

        function launchApp() {
            let url = document.getElementById("targetUrl").value.trim();
            const selfDestruct = document.getElementById("selfDestruct").checked;
            
            if (!url) { alert(i18n[currentLang].alert); return; }
            
            // 协议补全
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            // 重新集成核心逻辑：添加 ?igu=1 参数以解决连接问题
            if (!url.includes('igu=1')) {
                url += (url.includes('?') ? '&' : '?') + 'igu=1';
            }

            const win = window.open('about:blank', '_blank');
            if (!win) { alert("Popup blocked!"); return; }
            
            const doc = win.document;
            doc.title = '...';
            doc.body.style.cssText = 'margin:0;height:100vh;overflow:hidden;background:#000;';
            
            const iframe = doc.createElement('iframe');
            iframe.style.cssText = 'border:none;width:100%;height:100%;margin:0;';
            iframe.src = url;
            iframe.allowFullscreen = true;
            
            doc.body.appendChild(iframe);
            
            if (selfDestruct) setTimeout(() => window.close(), 500);
        }
    </script>
</body>
</html>
